<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercury & Sun</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="gate">
    <div class="popup">
        <h1>Do you like me?</h1>

        <div class="bunny">
            <img src="assets/bunny.png" alt="Bunny">
        </div>

        <div class="choices">
            <span id="yes">YES</span>
            <span id="or">or</span>
            <span id="no">NO</span>
        </div>

        <div id="message"></div>
    </div>
</div>

<div id="naughty">Naughty!!</div>

<div id="home">
    <h1 class="home-title">Celluaria's Secret Mercury World</h1>

    <div class="space-scene" id="spaceScene">
        <div class="orbit">
            <div class="mercury"></div>
        </div>
        <div class="sun"></div>
    </div>

    <div id="homeHint"></div>
</div>

<div id="emojiKeyboard">
    <div class="emoji-grid" id="emojiGrid"></div>
</div>

<div id="emojiAnimation"></div>

<div id="videoPage">
    <div class="stars"></div>

    <div class="transmission-panel">
        <h2>A transmission has been received.</h2>

        <video
            id="mercuryTransmission"
            controls
            autoplay
            playsinline
        >
            <source
                src="https://github.com/Celluaria/Project_Mercury/releases/download/1.0/MERCURY_NOTE.mp4"
                type="video/mp4"
            >
        </video>

        <a
            class="transmission-button"
            href="https://github.com/Celluaria/Project_Mercury/releases/download/1.0/MERCURY_NOTE.mp4"
            download
        >
            ⬇ Download the transmission
        </a>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
